  <text x="500.0" y="25" fill="#62748c" font-family="'DejaVu Sans Mono','Noto Sans Mono',monospace" font-size="14" text-anchor="middle">dexstrike — pipeline completo</text>
  <text x="28" y="64.0" fill="#39ff14" font-family="'DejaVu Sans Mono','Noto Sans Mono',monospace" font-size="16.5" xml:space="preserve">$ python3 main.py</text><text x="28" y="89.5" fill="#d7e0ea" font-family="'DejaVu Sans Mono','Noto Sans Mono',monospace" font-size="16.5" xml:space="preserve"></text><text x="28" y="115.0" fill="#b14bff" font-family="'DejaVu Sans Mono','Noto Sans Mono',monospace" font-size="16.5" xml:space="preserve">============================================================</text><text x="28" y="140.5" fill="#00eaff" font-family="'DejaVu Sans Mono','Noto Sans Mono',monospace" font-size="16.5" xml:space="preserve">  DexStrike — APK reverse engineering toolkit</text><text x="28" y="166.0" fill="#b14bff" font-family="'DejaVu Sans Mono','Noto Sans Mono',monospace" font-size="16.5" xml:space="preserve">============================================================</text><text x="28" y="191.5" fill="#d7e0ea" font-family="'DejaVu Sans Mono','Noto Sans Mono',monospace" font-size="16.5" xml:space="preserve">Escolha: 10</text><text x="28" y="217.0" fill="#d7e0ea" font-family="'DejaVu Sans Mono','Noto Sans Mono',monospace" font-size="16.5" xml:space="preserve"></text><text x="28" y="242.5" fill="#00eaff" font-family="'DejaVu Sans Mono','Noto Sans Mono',monospace" font-size="16.5" xml:space="preserve">[*] decompile -&gt; Manifest -&gt; detect -&gt; Frida -&gt; smali -&gt; build -&gt; sign</text><text x="28" y="268.0" fill="#00eaff" font-family="'DejaVu Sans Mono','Noto Sans Mono',monospace" font-size="16.5" xml:space="preserve">[*] Executando: apktool d -f base.apk -o workspace/base_decoded</text><text x="28" y="293.5" fill="#39ff14" font-family="'DejaVu Sans Mono','Noto Sans Mono',monospace" font-size="16.5" xml:space="preserve">[+] APK descompilado: workspace/base_decoded</text><text x="28" y="319.0" fill="#39ff14" font-family="'DejaVu Sans Mono','Noto Sans Mono',monospace" font-size="16.5" xml:space="preserve">[+] network_security_config aplicado.</text><text x="28" y="344.5" fill="#39ff14" font-family="'DejaVu Sans Mono','Noto Sans Mono',monospace" font-size="16.5" xml:space="preserve">[+] extractNativeLibs definido como True.</text><text x="28" y="370.0" fill="#00eaff" font-family="'DejaVu Sans Mono','Noto Sans Mono',monospace" font-size="16.5" xml:space="preserve">[*] ABIs detectadas: arm64-v8a, armeabi-v7a</text><text x="28" y="395.5" fill="#00eaff" font-family="'DejaVu Sans Mono','Noto Sans Mono',monospace" font-size="16.5" xml:space="preserve">[*] Frameworks: Flutter</text><text x="28" y="421.0" fill="#00eaff" font-family="'DejaVu Sans Mono','Noto Sans Mono',monospace" font-size="16.5" xml:space="preserve">[*] Baixando: frida-gadget-17.9.10-android-arm64.so.xz</text><text x="28" y="446.5" fill="#39ff14" font-family="'DejaVu Sans Mono','Noto Sans Mono',monospace" font-size="16.5" xml:space="preserve">[+] Frida Gadget injetado em: arm64-v8a, armeabi-v7a</text><text x="28" y="472.0" fill="#39ff14" font-family="'DejaVu Sans Mono','Noto Sans Mono',monospace" font-size="16.5" xml:space="preserve">[+] System.loadLibrary(&#x27;frida-gadget&#x27;) aplicado no smali</text><text x="28" y="497.5" fill="#39ff14" font-family="'DejaVu Sans Mono','Noto Sans Mono',monospace" font-size="16.5" xml:space="preserve">[+] Scripts Frida copiados e bundle gerado.</text><text x="28" y="523.0" fill="#00eaff" font-family="'DejaVu Sans Mono','Noto Sans Mono',monospace" font-size="16.5" xml:space="preserve">[*] Executando: apktool b -o outputs/base-patched-unsigned.apk</text><text x="28" y="548.5" fill="#39ff14" font-family="'DejaVu Sans Mono','Noto Sans Mono',monospace" font-size="16.5" xml:space="preserve">[+] APK recompilado: outputs/base-patched-unsigned.apk</text><text x="28" y="574.0" fill="#39ff14" font-family="'DejaVu Sans Mono','Noto Sans Mono',monospace" font-size="16.5" xml:space="preserve">[+] APK alinhado: outputs/base-patched-aligned.apk</text><text x="28" y="599.5" fill="#39ff14" font-family="'DejaVu Sans Mono','Noto Sans Mono',monospace" font-size="16.5" xml:space="preserve">[+] APK assinado: outputs/base-patched-signed.apk</text><text x="28" y="625.0" fill="#39ff14" font-family="'DejaVu Sans Mono','Noto Sans Mono',monospace" font-size="16.5" xml:space="preserve">[+] Relatório gerado: outputs/base-patch-report.md</text><text x="28" y="650.5" fill="#d7e0ea" font-family="'DejaVu Sans Mono','Noto Sans Mono',monospace" font-size="16.5" xml:space="preserve"></text><text x="28" y="676.0" fill="#ff2e97" font-family="'DejaVu Sans Mono','Noto Sans Mono',monospace" font-size="16.5" xml:space="preserve">[✔] Concluído — outputs/base-patched-signed.apk</text>
</svg>
